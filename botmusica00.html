<!DOCTYPE html>
<html>
<head>
    <title>🎵 MP3 Finder Pro</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        min-height: 100vh;
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .container {
        background: rgba(255, 255, 255, 0.97);
        backdrop-filter: blur(30px);
        border-radius: 40px;
        padding: 50px;
        max-width: 1100px;
        width: 100%;
        box-shadow: 0 35px 70px rgba(0,0,0,0.28);
        border: 1px solid rgba(255,255,255,0.25);
        position: relative;
        overflow: hidden;
    }
    
    .container::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 6px;
        background: linear-gradient(90deg, #FF6B6B, #4ECDC4, #45B7D1, #FFD23F);
        border-radius: 40px 40px 0 0;
    }
    
    .header {
        text-align: center;
        margin-bottom: 40px;
    }
    
    h1 {
        font-size: 3.2em;
        background: linear-gradient(45deg, #FF6B6B, #4ECDC4, #45B7D1, #FFD23F);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 10px;
        font-weight: 900;
        letter-spacing: -1px;
    }
    
    .modos-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        margin-bottom: 40px;
    }
    
    .modo-unica {
        background: linear-gradient(135deg, rgba(78,205,196,0.12), rgba(255,107,107,0.12));
        padding: 45px 35px 35px 35px;
        border-radius: 30px;
        border: 2px solid rgba(78,205,196,0.4);
        position: relative;
        overflow: hidden;
    }
    
    .modo-unica::before {
        content: '🎵 MODO ÚNICA';
        position: absolute;
        top: 15px;
        left: 25px;
        background: linear-gradient(45deg, #4ECDC4, #44A08D);
        color: white;
        padding: 8px 22px;
        border-radius: 22px;
        font-weight: 700;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    
    .modo-lista {
        background: linear-gradient(135deg, rgba(255,87,34,0.12), rgba(255,152,0,0.12));
        padding: 45px 35px 35px 35px;
        border-radius: 30px;
        border: 2px solid rgba(255,87,34,0.4);
        position: relative;
        overflow: hidden;
    }
    
    .modo-lista::before {
        content: '📋 LISTA MASSIVA';
        position: absolute;
        top: 15px;
        left: 25px;
        background: linear-gradient(45deg, #FF5722, #FF8A65);
        color: white;
        padding: 8px 22px;
        border-radius: 22px;
        font-weight: 700;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    
    .search-box {
        position: relative;
        margin-bottom: 25px;
    }
    
    input {
        width: 100%;
        padding: 20px 25px 20px 70px;
        font-size: 16px;
        border: 3px solid rgba(255,255,255,0.5);
        border-radius: 50px;
        outline: none;
        background: rgba(255,255,255,0.98);
        backdrop-filter: blur(20px);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        font-weight: 600;
        box-shadow: 0 12px 35px rgba(0,0,0,0.12);
    }
    
    input:focus {
        border-color: #4ECDC4;
        box-shadow: 0 0 0 4px rgba(78,205,196,0.3), 0 18px 45px rgba(78,205,196,0.15);
        transform: translateY(-3px);
    }
    
    input::placeholder {
        color: #999;
        font-weight: 500;
    }
    
    textarea {
        width: 100%;
        height: 240px;
        padding: 25px;
        font-size: 15px;
        border: 3px solid rgba(255,255,255,0.5);
        border-radius: 25px;
        outline: none;
        background: rgba(255,255,255,0.98);
        backdrop-filter: blur(20px);
        font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
        resize: vertical;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 12px 35px rgba(0,0,0,0.12);
        line-height: 1.6;
    }
    
    textarea:focus {
        border-color: #FF5722;
        box-shadow: 0 0 0 4px rgba(255,87,34,0.3), 0 18px 45px rgba(255,87,34,0.15);
        transform: translateY(-3px);
    }
    
    textarea::placeholder {
        color: #bbb;
        font-weight: 500;
    }
    
    .btn {
        padding: 20px 50px;
        font-size: 16px;
        font-weight: 800;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        text-transform: uppercase;
        letter-spacing: 1.2px;
        box-shadow: 0 12px 35px rgba(0,0,0,0.25);
        position: relative;
        overflow: hidden;
        width: 100%;
    }
    
    .btn-unica {
        background: linear-gradient(45deg, #4ECDC4, #44A08D);
        color: white;
    }
    
    .btn-lista {
        background: linear-gradient(45deg, #FF5722, #FF8A65);
        color: white;
        margin-top: 20px;
    }
    
    .btn:hover {
        transform: translateY(-6px);
        box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }
    
    .btn:active {
        transform: translateY(-2px);
    }
    
    #resultado {
        margin-top: 40px;
        padding: 40px;
        background: rgba(255,255,255,0.97);
        border-radius: 30px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.25);
        min-height: 180px;
        backdrop-filter: blur(25px);
        border: 1px solid rgba(255,255,255,0.35);
        opacity: 0;
        transform: translateY(30px);
        transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    #resultado.show {
        opacity: 1;
        transform: translateY(0);
    }
    
    .sucesso {
        background: linear-gradient(135deg, #4CAF50, #66BB6A);
        color: white;
        padding: 40px;
        border-radius: 30px;
        text-align: center;
    }
    
    .sucesso h3 {
        font-size: 2.2em;
        margin-bottom: 25px;
        text-shadow: 0 4px 15px rgba(0,0,0,0.4);
        font-weight: 900;
    }
    
    .link {
        display: inline-block;
        padding: 20px 60px;
        background: linear-gradient(45deg, #FF5722, #FF8A65);
        color: white;
        text-decoration: none;
        border-radius: 50px;
        font-size: 20px;
        font-weight: 900;
        box-shadow: 0 18px 45px rgba(255,87,34,0.45);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin: 25px 0;
    }
    
    .link:hover {
        transform: translateY(-8px);
        box-shadow: 0 25px 60px rgba(255,87,34,0.65);
    }
    
    #lista-links {
        max-height: 500px;
        overflow-y: auto;
        background: rgba(255,255,255,0.97);
        padding: 35px;
        border-radius: 30px;
        margin-top: 35px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.25);
        backdrop-filter: blur(25px);
        border: 1px solid rgba(255,255,255,0.35);
        opacity: 0;
        transform: translateY(30px);
        transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    #lista-links.show {
        opacity: 1;
        transform: translateY(0);
    }
    
    .musica-link {
        padding: 20px;
        margin: 15px 0;
        background: linear-gradient(135deg, rgba(76,175,80,0.15), rgba(102,187,106,0.15));
        border-radius: 22px;
        cursor: pointer;
        border-left: 6px solid #4CAF50;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        text-align: left;
        border: 2px solid rgba(76,175,80,0.25);
        position: relative;
        overflow: hidden;
    }
    
    .musica-link::before {
        content: '🎵';
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 20px;
        opacity: 0;
        transition: all 0.4s ease;
    }
    
    .musica-link:hover {
        background: linear-gradient(135deg, rgba(76,175,80,0.25), rgba(102,187,106,0.25));
        transform: translateX(12px);
        box-shadow: 0 12px 35px rgba(76,175,80,0.35);
    }
    
    .musica-link:hover::before {
        opacity: 1;
        transform: translateY(-50%) scale(1.1);
    }
    
    .musica-link a {
        color: #2E7D32;
        text-decoration: none;
        font-weight: 800;
        font-size: 16px;
    }
    
    .loading {
        color: #666;
        font-size: 22px;
        font-weight: 600;
        padding: 60px;
        text-align: center;
    }
    
    @media (max-width: 768px) {
        .container { 
            padding: 35px 25px; 
            margin: 10px;
        }
        h1 { 
            font-size: 2.5em; 
        }
        .modos-container {
            grid-template-columns: 1fr;
            gap: 25px;
        }
        .modo-unica, .modo-lista {
            padding: 55px 25px 25px 25px;
        }
        .modo-unica::before, .modo-lista::before {
            left: 18px;
            font-size: 11px;
            padding: 7px 18px;
        }
        input { 
            padding: 18px 22px 18px 65px;
            font-size: 15px; 
        }
        textarea { 
            height: 200px; 
            font-size: 14px; 
            padding: 22px;
        }
        .btn { 
            padding: 18px 40px; 
            font-size: 15px; 
        }
    }
</style>

</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 MusicFinder Pro</h1>
        </div>
    <!-- MODOS DE PESQUISA -->
    <div class="modos-container">
        <!-- MODO 1: Uma música -->
        <div class="modo-unica">
            <div class="search-box">
                <input id="nome" placeholder="Digite o nome da música" onkeypress="if(event.key==='Enter')buscar()">
                <button class="btn btn-unica" onclick="buscar()">
                    <strong>🔍 Buscar Música</strong>
                </button>
            </div>
        </div>
        
        <!-- MODO 2: Lista -->
        <div class="modo-lista">
            <textarea id="lista" placeholder="Cole sua lista de músicas aqui (uma por linha):

Vou Festejar – Beth Carvalho
Planet Rock – Afrika Bambaataa

Jesus Chorou – Racionais
Envolver – Anitta
Bohemian Rhapsody – Queen
..."></textarea>
<button class="btn btn-lista" onclick="processarLista()">
<strong>🎶 Processar Lista</strong>
</button>
</div>
</div>


    <div id="resultado">
        <div style="color:#999;padding:60px;font-size:18px;text-align:center;">
            Selecione um modo acima 👆
        </div>
    </div>
    
    <div id="lista-links"></div>
</div>

<script>
    function buscar() {
        const musica = document.getElementById('nome').value.trim();
        if(!musica) return;
        
        const res = document.getElementById('resultado');
        res.classList.add('show');
        res.innerHTML = '<div class="loading">🔍 Gerando link 4shared...</div>';
        
        setTimeout(() => {
            const link4shared = `https://www.4shared.com/web/q?query=${encodeURIComponent(musica)}`;
            res.innerHTML = `
                <div class="sucesso">
                    <h3>${musica.toUpperCase()}</h3>
                    <a href="${link4shared}" target="_blank" class="link">📥 ABRIR 4SHARED</a>
                    <p style="margin-top:30px;opacity:0.95;font-size:17px;">
                        🎯 Clique e pegue o 1º resultado!
                    </p>
                </div>
            `;
        }, 1000);
    }
    
    function processarLista() {
        const texto = document.getElementById('lista').value.trim();
        if(!texto) return alert('Cole a lista!');
        
        const musicas = texto.split('\n')
            .map(linha => linha.trim())
            .filter(linha => linha && !linha.startsWith('🎶') && !linha.includes('– Anos'));
        
        const listaDiv = document.getElementById('lista-links');
        const resultado = document.getElementById('resultado');
        
        resultado.classList.add('show');
        resultado.innerHTML = `<div class="loading">🔍 Processando ${musicas.length} músicas...</div>`;
        listaDiv.classList.add('show');
        
        let html = `<h3 style="color:#4CAF50;margin-bottom:25px;font-size:1.9em;text-align:center;">📋 ${musicas.length} Links Gerados</h3>`;
        
        musicas.forEach((musica, index) => {
            const nomeLimpo = musica.replace(/[–-]/g, '').trim();
            const link = `https://www.4shared.com/web/q?query=${encodeURIComponent(nomeLimpo)}`;
            
            html += `
                <div class="musica-link" onclick="window.open('${link}')">
                    <strong style="color:#2E7D32;font-size:17px;">${index+1}.</strong> 
                    <a href="${link}" target="_blank">${nomeLimpo}</a>
                </div>
            `;
        });
        
        listaDiv.innerHTML = html;
        resultado.innerHTML = `
            <div style="color:#4CAF50;font-size:20px;padding:40px;text-align:center;">
                ✅ <strong>${musicas.length}</strong> links prontos!
                <br><span style="font-size:15px;">Clique nas músicas para abrir no 4shared</span>
            </div>
        `;
        
        listaDiv.scrollIntoView({behavior: 'smooth'});
    }
</script>

</body>
</html>
